name: Build Website

on:
  push:
    branches:
      - main
    paths-ignore:
      # Nicht triggern wenn nur dist/ geändert wurde (verhindert Endlosschleife)
      - 'dist/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Website bauen
        run: node build.js

      - name: dist/ committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet && echo "Keine Änderungen." || (
            git commit -m "build: dist/ aktualisiert [skip ci]"
            git push
          )
